<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UVB OPERATOR CONSOLE</title>

<style>
body {
  background:black;
  color:#00ff99;
  font-family:monospace;
  margin:0;
  padding:20px;
}

h1 {
  text-align:center;
  letter-spacing:3px;
}

.panel {
  border:1px solid #00ff99;
  padding:10px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:15px;
  margin:5px 0;
  background:transparent;
  border:1px solid #00ff99;
  color:#00ff99;
  font-size:16px;
}

button:hover {
  background:#00ff99;
  color:black;
}

.danger {
  border-color:red;
  color:red;
}

.logs {
  height:250px;
  overflow-y:auto;
  border:1px solid #00ff99;
  padding:10px;
  font-size:12px;
}
</style>
</head>

<body>

<h1>UVB OPERATOR NODE</h1>

<div class="panel">
📡 STATUS: <span id="status">SIGNAL STABLE</span><br>
FREQ: <span id="freq">4625 kHz</span><br>
NODE: X-04
</div>

<button onclick="buzz('SIGNAL')">📡 BUZZ SIGNAL</button>
<button onclick="buzz('BROADCAST')">📢 BUZZ BROADCAST</button>
<button class="danger" onclick="buzz('ANOMALY')">⚠ TRIGGER ANOMALY</button>
<button onclick="resetSys()">🔄 RESET</button>

<div class="logs" id="logs"></div>

<script>

let freq = 4625;

// 🔊 UVB-76 CONTINUOUS BUZZ
let uvbLoop = new Audio("https://upload.wikimedia.org/wikipedia/commons/3/3f/The_Buzzer_UVB-76.ogg");
uvbLoop.loop = true;
uvbLoop.volume = 0.4;

// 🔊 Operator beep
let uvbBeep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function log(msg){
  let time = new Date().toLocaleTimeString();
  document.getElementById("logs").innerHTML =
  `[${time}] ${msg}<br>` + document.getElementById("logs").innerHTML;
}

function setStatus(s){
  document.getElementById("status").innerText = s;
}

function playBeep(){
  uvbBeep.currentTime = 0;
  uvbBeep.play();
}

function buzz(type){

  let code = rand(1000,9999);

  if(type=="SIGNAL"){
    setStatus("SIGNAL ACTIVE");
    log("📡 SIGNAL BUZZ → CODE "+code);
    playBeep();
  }

  if(type=="BROADCAST"){
    setStatus("TRANSMITTING");
    log("📢 BROADCAST SENT @ "+freq+" kHz | "+code);
    playBeep();
  }

  if(type=="ANOMALY"){
    setStatus("⚠ DISTURBANCE");
    freq += rand(-2,2);
    log("⚠ ANOMALY DETECTED | DRIFT → "+freq+" kHz | "+code);
    playBeep();
  }
}

function resetSys(){
  freq = 4625;
  setStatus("SIGNAL STABLE");
  log("SYSTEM RESET");
}

// 📱 iPhone fix — start audio after first tap
document.body.addEventListener("click", function startAudio(){
  uvbLoop.play();
  document.body.removeEventListener("click", startAudio);
});

</script>

</body>
</html>
